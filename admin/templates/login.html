<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — AI Bot Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-card card shadow">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-robot display-4 text-purple"></i>
                <h2 class="mt-2 text-light">AI Bot Admin</h2>
                <p class="text-muted">Введите пароль для входа</p>
            </div>

            {% if error %}
            <div class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/admin/login">
                <div class="mb-3">
                    <label for="password" class="form-label text-light">Пароль</label>
                    <input
                        type="password"
                        class="form-control bg-dark text-light border-secondary"
                        id="password"
                        name="password"
                        placeholder="Введите пароль"
                        required
                        autofocus
                    >
                </div>
                <button type="submit" class="btn btn-purple w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                </button>
            </form>
        </div>
    </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
