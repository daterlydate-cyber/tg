<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Bot Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-robot me-2"></i>AI Bot Admin
        </div>
        <nav class="sidebar-nav">
            <a href="/admin/dashboard" class="nav-link {% if request.url.path == '/admin/dashboard' %}active{% endif %}">
                <i class="bi bi-speedometer2 me-2"></i>Дашборд
            </a>
            <a href="/admin/users" class="nav-link {% if '/admin/users' in request.url.path %}active{% endif %}">
                <i class="bi bi-people me-2"></i>Пользователи
            </a>
            <a href="/admin/api/stats" class="nav-link" target="_blank">
                <i class="bi bi-bar-chart me-2"></i>API Stats
            </a>
            <hr class="sidebar-divider">
            <a href="/admin/logout" class="nav-link text-danger">
                <i class="bi bi-box-arrow-right me-2"></i>Выйти
            </a>
        </nav>
    </div>

    <!-- Page Content -->
    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg topbar shadow-sm mb-4">
            <div class="container-fluid">
                <button class="btn btn-sm btn-outline-secondary me-2" id="sidebarToggle">
                    <i class="bi bi-list"></i>
                </button>
                <span class="navbar-brand mb-0 h1 text-light">
                    {% block page_title %}Admin Panel{% endblock %}
                </span>
            </div>
        </nav>

        <div class="container-fluid px-4">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function() {
        document.getElementById('wrapper').classList.toggle('sidebar-collapsed');
    });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
